name: Deploy to GitHub Pages

on:
  # Run on every push to main
  push:
    branches: [main]
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Permissions required by actions/deploy-pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, but don't cancel in-progress runs
# (let the running deploy finish so the live site is never half-built)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install, build, and upload Astro site
        uses: withastro/action@v3
        # withastro/action@v3 runs `npm ci` then `npm run build`,
        # then uploads the dist/ folder as a Pages artifact.

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
